<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สินค้าเกิน</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
:root{
  --bg:#F2F3F8;--surface:#FFFFFF;--surface2:#F7F8FC;--border:#E4E5EF;
  --accent:#534AB7;--accent-dim:#EAE9F7;--accent-text:#FFFFFF;
  --text:#111219;--text2:#6B6D82;--text3:#9B9DB5;
  --green:#1FB075;--red:#E0404A;--orange:#E07020;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
  --transition:200ms ease;
}
[data-theme="dark"]{
  --bg:#0C0D12;--surface:#161720;--surface2:#1E1F2C;--border:#272835;
  --accent:#7C74E8;--accent-dim:#1E1D34;--accent-text:#FFFFFF;
  --text:#EDEEF6;--text2:#8E90A8;--text3:#5A5C72;
  --green:#25C97F;--red:#FF5561;--orange:#F09030;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.4);
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Kanit,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--transition),color var(--transition)}
.mono{font-family:'SF Mono','Fira Code','Consolas',monospace}

/* Layout */
.w{max-width:480px;margin:0 auto;padding:12px 12px 80px}

/* Header */
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 14px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:background var(--transition),border-color var(--transition)}
.hd-left{display:flex;align-items:center;gap:8px}
.hd-icon{width:32px;height:32px;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hd-icon svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hd-title{font-size:15px;font-weight:700;color:var(--text)}
.hd-right{display:flex;align-items:center;gap:8px}
.conn-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);padding:4px 8px;background:var(--surface2);border-radius:20px;border:1px solid var(--border)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.conn-dot.ok{background:var(--green)}.conn-dot.err{background:var(--red)}
.theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--transition)}
.theme-btn:hover{background:var(--accent-dim)}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow-sm);transition:background var(--transition),border-color var(--transition)}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:700;color:var(--text);font-family:'SF Mono','Consolas',monospace}

/* Main tabs */
.main-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow-sm)}
.mtab{flex:1;padding:9px 6px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);border:none;border-radius:10px;transition:all var(--transition);white-space:nowrap}
.mtab.on{background:var(--accent);color:var(--accent-text);box-shadow:0 2px 8px rgba(83,74,183,.35)}

/* Card / Form container */
.fc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);transition:background var(--transition),border-color var(--transition)}
.fc-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

/* Form fields */
.frow{margin-bottom:12px}
label.fl{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.req{color:var(--red);margin-left:2px}
input[type=text]{width:100%;font-size:15px;padding:11px 13px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--surface2);color:var(--text);outline:none;transition:all var(--transition);font-family:inherit;-webkit-appearance:none}
input[type=text]:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(83,74,183,.12)}
input.mono-input{font-family:'SF Mono','Consolas',monospace;letter-spacing:.5px}
input[readonly]{background:var(--accent-dim);color:var(--accent);font-weight:600;border-color:var(--accent-dim)}

/* Barcode preview */
.bc-wrap{margin-top:8px;padding:10px;background:var(--surface2);border-radius:var(--radius-xs);border:1px solid var(--border);text-align:center;display:none;transition:all var(--transition)}
.bc-wrap.flash{animation:bcflash .4s ease}
@keyframes bcflash{0%{background:var(--surface2)}40%{background:#d4fce8}100%{background:var(--surface2)}}
.bc-val{font-family:'SF Mono','Consolas',monospace;font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:1px}
.bc-wrap svg{max-width:100%;height:50px}

/* Hint */
.hint{font-size:11px;margin-top:5px;display:none;padding:6px 10px;border-radius:6px;font-weight:500}
.hint.ok{background:#e6f9f0;color:var(--green)}
.hint.warn{background:#fff4e5;color:var(--orange)}
[data-theme="dark"] .hint.ok{background:#0d2d1e}
[data-theme="dark"] .hint.warn{background:#2a1d06}

/* Unit buttons */
.unit-wrap{display:flex;gap:6px;flex-wrap:wrap}
.unit-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:var(--surface2);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all var(--transition);font-family:'SF Mono','Consolas',monospace}
.unit-btn:hover{border-color:var(--accent);color:var(--accent)}
.unit-btn.on{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(83,74,183,.3)}

/* Qty row */
.qty-row{display:flex;gap:8px;align-items:stretch}
.sign-btn{width:46px;flex-shrink:0;font-size:20px;font-weight:700;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:var(--surface2);color:var(--text);cursor:pointer;transition:all var(--transition);font-family:monospace}
.sign-btn.neg{border-color:var(--red);color:var(--red);background:rgba(224,64,74,.07)}
.piece-calc{font-size:12px;color:var(--accent);margin-top:5px;font-family:'SF Mono','Consolas',monospace;display:none}

/* Lock row */
.lock-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);margin:8px 0 14px;cursor:pointer;user-select:none}
.lock-row input{width:15px;height:15px;accent-color:var(--accent)}

/* Buttons */
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:all var(--transition);font-family:inherit;letter-spacing:.2px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(83,74,183,.35)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:active{transform:scale(.98);filter:brightness(.95)}
.btn-primary:disabled{background:var(--text3);box-shadow:none;cursor:not-allowed}
.btn-ghost{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn+.btn{margin-top:8px}

/* Cart */
.cart-hd{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cart-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--accent-dim);border-radius:var(--radius-xs);margin-bottom:6px;border:1px solid var(--border)}
.cart-bc{font-family:'SF Mono','Consolas',monospace;font-size:12px;font-weight:700;color:var(--text);min-width:80px}
.cart-nm{font-size:12px;color:var(--accent);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-qty{font-family:'SF Mono','Consolas',monospace;font-size:13px;font-weight:700;color:var(--text);white-space:nowrap}
.cart-del{color:var(--red);cursor:pointer;font-size:17px;padding:0 2px;flex-shrink:0;opacity:.6;transition:opacity var(--transition)}
.cart-del:hover{opacity:1}
.divider{height:1px;background:var(--border);margin:12px 0}

/* View tabs */
.view-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow-sm)}
.vtab{flex:1;padding:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);border:none;border-radius:10px;transition:all var(--transition)}
.vtab.on{background:var(--accent-dim);color:var(--accent)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lbl{font-size:13px;font-weight:600;color:var(--text2)}
.exp-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xs);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all var(--transition)}
.exp-btn:hover{border-color:var(--accent);color:var(--accent)}
.exp-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);transition:background var(--transition),border-color var(--transition)}
.card-body{padding:13px 14px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-time{font-size:11px;color:var(--text3);font-family:'SF Mono','Consolas',monospace}
.card-loc{font-size:11px;font-weight:600;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:20px;border:1px solid var(--border)}
.card-bc{font-family:'SF Mono','Consolas',monospace;font-size:12px;color:var(--text3);margin-bottom:4px;letter-spacing:.5px}
.card-nm{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px}
.card-nm.empty{color:var(--text3);font-weight:400}
.cnt-row{display:flex;gap:8px}
.cnt-box{flex:1;background:var(--surface2);border-radius:var(--radius-xs);padding:8px 10px;text-align:center;border:1px solid var(--border)}
.cnt-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.cnt-num{font-size:20px;font-weight:700;color:var(--text);font-family:'SF Mono','Consolas',monospace}
.neg{color:var(--green)}

/* Table */
.tbl-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
th{background:var(--surface2);padding:9px 10px;text-align:left;font-weight:700;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
td.bc-td{font-family:'SF Mono','Consolas',monospace;font-size:11px;color:var(--text2)}
td.nm-td{color:var(--accent);font-weight:500}
td.num-td{font-family:'SF Mono','Consolas',monospace;font-weight:700;text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* Master */
.master-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-wrap input{padding-left:34px}
.master-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow-sm);transition:border-color var(--transition)}
.master-item:hover{border-color:var(--accent)}
.mi-bc{font-family:'SF Mono','Consolas',monospace;font-size:11px;color:var(--text3);margin-bottom:3px;letter-spacing:.5px}
.mi-nm{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.mi-units{display:flex;gap:5px;flex-wrap:wrap}
.unit-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:700;font-family:'SF Mono','Consolas',monospace;border:1px solid var(--border)}
.unit-row-inp{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.unit-row-inp input{flex:1;font-size:14px;padding:9px 11px}
.unit-row-inp .sz{width:90px}
.unit-row-inp .del-u{color:var(--red);cursor:pointer;font-size:18px;opacity:.5;transition:opacity var(--transition)}
.unit-row-inp .del-u:hover{opacity:1}
.add-unit-btn{padding:7px 14px;border:1.5px dashed var(--accent);border-radius:var(--radius-xs);background:transparent;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition)}
.add-unit-btn:hover{background:var(--accent-dim)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:99;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="w">

  <!-- Header -->
  <div class="hd">
    <div class="hd-left">
      <div class="hd-icon">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
      </div>
      <span class="hd-title">สินค้าเกิน</span>
    </div>
    <div class="hd-right">
      <div class="conn-badge">
        <div class="conn-dot" id="connDot"></div>
        <span id="connTxt">กำลังเชื่อมต่อ...</span>
      </div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Dark/Light mode">🌙</button>
    </div>
  </div>

  <!-- Main tabs -->
  <div class="main-tabs">
    <button class="mtab on" id="tabScan" onclick="switchMain('scan')">📷 สแกน</button>
    <button class="mtab" id="tabReport" onclick="switchMain('report')">📋 รายงาน</button>
    <button class="mtab" id="tabMaster" onclick="switchMain('master')">🗂 Master</button>
  </div>

  <!-- ===== SCAN ===== -->
  <div id="pageScan">
    <div class="stats">
      <div class="stat"><div class="stat-label">รายการ</div><div class="stat-val" id="stCount">—</div></div>
      <div class="stat"><div class="stat-label">ชิ้นรวม</div><div class="stat-val" id="stTotal">—</div></div>
    </div>

    <div class="fc">
      <div class="fc-title">เพิ่มรายการใหม่</div>

      <div class="frow">
        <label class="fl">① โลเคชั่น<span class="req">*</span></label>
        <input type="text" id="fLoc" placeholder="เช่น A3" autocomplete="off"
          onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('fBarcode').focus()}">
      </div>

      <div class="frow">
        <label class="fl">② บาร์โค้ด<span class="req">*</span></label>
        <input type="text" id="fBarcode" class="mono-input" placeholder="สแกนหรือพิมพ์บาร์โค้ด"
          oninput="onBarcodeInput()" autocomplete="off" inputmode="numeric">
        <div class="bc-wrap" id="bcPreview">
          <svg id="bcSvgForm"></svg>
          <div class="bc-val" id="bcValForm"></div>
        </div>
      </div>

      <div class="frow">
        <label class="fl">③ ชื่อสินค้า</label>
        <input type="text" id="fItemName" placeholder="ดึงอัตโนมัติ หรือพิมพ์เองถ้าไม่พบ" autocomplete="off">
        <div class="hint" id="itemHint"></div>
      </div>

      <div class="frow">
        <label class="fl">④ หน่วย</label>
        <div class="unit-wrap" id="unitBtns"></div>
        <input type="hidden" id="fUnit" value="pcs">
        <input type="hidden" id="fUnitQty" value="1">
      </div>

      <div class="frow">
        <label class="fl">⑤ จำนวน <span style="color:var(--text3);font-weight:400">(± เพื่อลบล้าง)</span></label>
        <div class="qty-row">
          <button type="button" class="sign-btn" id="btnSign" onclick="toggleSign()">+</button>
          <input type="text" id="fQty" value="1" class="mono-input"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="flex:1"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addToCart()}"
            oninput="updatePieceCalc()">
        </div>
        <div class="piece-calc" id="pieceCalc"></div>
      </div>

      <label class="lock-row">
        <input type="checkbox" id="fLockLoc" checked> ล็อกโลเคชั่นไว้ใช้ต่อ
      </label>

      <button class="btn btn-ghost" onclick="addToCart()">✅ บันทึก</button>

      <div id="cartArea" style="display:none;margin-top:14px">
        <div class="divider"></div>
        <div class="cart-hd">รายการในตะกร้า (<span id="cartCount">0</span>)</div>
        <div id="cartList"></div>
        <button class="btn btn-primary" id="btnSave" onclick="submitCart()">
          💾 ส่งเข้า Google Sheet
        </button>
      </div>
    </div>
  </div>

  <!-- ===== REPORT ===== -->
  <div id="pageReport" style="display:none">
    <div class="view-tabs">
      <button class="vtab on" id="vCard" onclick="switchView('card')">การ์ด</button>
      <button class="vtab" id="vTable" onclick="switchView('table')">ตาราง</button>
    </div>
    <div class="toolbar">
      <span class="lbl" id="listLbl">รายการทั้งหมด</span>
      <button class="exp-btn" onclick="exportCSV()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
    <div id="cardView"></div>
    <div id="tableView" style="display:none"></div>
  </div>

  <!-- ===== MASTER ===== -->
  <div id="pageMaster" style="display:none">
    <div class="master-form">
      <div class="fc-title">➕ เพิ่มสินค้าใหม่</div>
      <div class="frow">
        <label class="fl">บาร์โค้ด<span class="req">*</span></label>
        <input type="text" id="mBarcode" class="mono-input" placeholder="บาร์โค้ด" autocomplete="off" inputmode="numeric">
      </div>
      <div class="frow">
        <label class="fl">ชื่อสินค้า<span class="req">*</span></label>
        <input type="text" id="mName" placeholder="ชื่อสินค้า" autocomplete="off">
      </div>
      <div class="frow">
        <label class="fl">หน่วย & ขนาด <span style="color:var(--text3);font-weight:400">(เช่น pcs=1, pack=12, case=48)</span></label>
        <div id="mUnitList"></div>
        <button type="button" class="add-unit-btn" onclick="addMUnitRow()">+ เพิ่มหน่วย</button>
      </div>
      <button class="btn btn-primary" onclick="saveMasterItem()" style="margin-top:12px">💾 บันทึกลง Master</button>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="mSearch" placeholder="ค้นหาบาร์โค้ดหรือชื่อสินค้า..." oninput="renderMaster()">
    </div>
    <div id="masterList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyZxKt6kqHU5Pj2oUUpN4vFj4VOvhS8NJDJPkcuAb-HSPljCTqcZsY1sBL3O95klcSBqA/exec';

let items = [];       // log rows
let masterMap = {};   // barcode -> {name, units:[{label,qty}]}
let cart = [];
let view = 'card';
let mainPage = 'scan';

// ===== TOAST =====
function showToast(msg, dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function setConn(ok,txt){
  document.getElementById('connDot').className='dot '+(ok?'ok':'err');
  document.getElementById('connTxt').textContent=txt;
}

// ===== MAIN TAB =====
function switchMain(p){
  mainPage=p;
  ['scan','report','master'].forEach(n=>{
    document.getElementById('page'+n.charAt(0).toUpperCase()+n.slice(1)).style.display=n===p?'':'none';
    document.getElementById('tab'+n.charAt(0).toUpperCase()+n.slice(1)).className='mtab'+(n===p?' on':'');
  });
  if(p==='master') renderMaster();
}

// ===== VIEW TOGGLE =====
function switchView(v){
  view=v;
  document.getElementById('cardView').style.display=v==='card'?'':'none';
  document.getElementById('tableView').style.display=v==='table'?'':'none';
  document.getElementById('vCard').className='vtab'+(v==='card'?' on':'');
  document.getElementById('vTable').className='vtab'+(v==='table'?' on':'');
}

// ===== SIGN TOGGLE =====
function toggleSign(){
  const btn=document.getElementById('btnSign');
  const neg=btn.textContent==='+';
  btn.textContent=neg?'−':'+';
  btn.style.color=neg?'#A32D2D':'#1a1a1a';
  btn.style.borderColor=neg?'#A32D2D':'#ddd';
  updatePieceCalc();
}

// ===== UNIT BUTTONS =====
function renderUnitBtns(units){
  const wrap=document.getElementById('unitBtns');
  if(!units||units.length===0){
    // default
    wrap.innerHTML=`
      <button type="button" class="unit-btn on" onclick="pickUnit(this,'pcs',1)">pcs</button>
      <button type="button" class="unit-btn" onclick="pickUnit(this,'pack',12)">pack</button>
      <button type="button" class="unit-btn" onclick="pickUnit(this,'case',48)">case</button>`;
    pickUnit(wrap.querySelector('.unit-btn'),'pcs',1);
  } else {
    wrap.innerHTML=units.map((u,i)=>`
      <button type="button" class="unit-btn${i===0?' on':''}" onclick="pickUnit(this,'${u.label}',${u.qty})">${u.label}${u.qty>1?` ×${u.qty}`:''}</button>`).join('');
    if(units.length>0) pickUnit(wrap.querySelector('.unit-btn'),units[0].label,units[0].qty);
  }
}

function pickUnit(btn,label,qty){
  document.querySelectorAll('#unitBtns .unit-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('fUnit').value=label;
  document.getElementById('fUnitQty').value=qty;
  updatePieceCalc();
}

function updatePieceCalc(){
  const qtyStr=document.getElementById('fQty').value.replace(/[\u2010-\u2015\u2212\uFF0D]/g,'-');
  const qtyVal=Math.abs(parseInt(qtyStr)||1);
  const uqty=parseInt(document.getElementById('fUnitQty').value)||1;
  const isNeg=document.getElementById('btnSign').textContent==='−';
  const calc=document.getElementById('pieceCalc');
  if(uqty>1){
    const total=(isNeg?-1:1)*qtyVal*uqty;
    calc.textContent=`= ${Math.abs(total)} ชิ้น (${isNeg?'-':''}${qtyVal} × ${uqty})`;
    calc.style.display='block';
  } else {
    calc.style.display='none';
  }
}

// ===== BARCODE PREVIEW + LOOKUP =====
function onBarcodeInput(){
  previewBarcode();
  clearTimeout(window._bcTimer);
  const val=document.getElementById('fBarcode').value.trim();
  if(val.length>=6){
    window._bcTimer=setTimeout(()=>{
      // only jump if barcode field still has focus (user isn't typing fast)
      if(document.activeElement.id==='fBarcode'){
        const qty=document.getElementById('fQty');
        qty.select();
        qty.focus();
      }
    },800);
  }
}

function previewBarcode(){
  const val=document.getElementById('fBarcode').value.trim();
  const wrap=document.getElementById('bcPreview');
  const hint=document.getElementById('itemHint');
  if(!val){
    wrap.style.display='none';
    document.getElementById('fItemName').value='';
    document.getElementById('fItemName').readOnly=false;
    hint.style.display='none';
    renderUnitBtns(null);
    return;
  }
  try{
    JsBarcode('#bcSvgForm',val,{format:'CODE128',width:1.5,height:48,displayValue:false,margin:4});
    document.getElementById('bcValForm').textContent=val;
    wrap.style.display='block';
  }catch(e){wrap.style.display='none';}

  const m=masterMap[val];
  if(m){
    document.getElementById('fItemName').value=m.name;
    document.getElementById('fItemName').readOnly=true;
    document.getElementById('fItemName').style.background='#F7F7FB';
    hint.textContent='✅ พบในระบบ master';hint.style.color='#3aaa6e';hint.style.display='block';
    renderUnitBtns(m.units||null);
  } else {
    document.getElementById('fItemName').value='';
    document.getElementById('fItemName').readOnly=false;
    document.getElementById('fItemName').style.background='#fff';
    hint.textContent='⚠️ ไม่พบในระบบ master — พิมพ์ชื่อสินค้าเองได้ หรือไปเพิ่มใน Master';
    hint.style.color='#e07000';hint.style.display='block';
    renderUnitBtns(null);
  }
}

// ===== CART =====
function addToCart(){
  const barcode=document.getElementById('fBarcode').value.trim();
  const loc=document.getElementById('fLoc').value.trim();
  const itemName=document.getElementById('fItemName').value.trim();
  if(!barcode){showToast('⚠️ กรุณาสแกนหรือกรอกบาร์โค้ด');return;}
  if(!loc){showToast('⚠️ กรุณาระบุโลเคชั่น');return;}
  if(!/^[0-9]+$/.test(barcode)){showToast('⚠️ บาร์โค้ดรับเฉพาะตัวเลข ห้ามยิง QR code',3000);return;}
  const qtyStr=document.getElementById('fQty').value.replace(/[\u2010-\u2015\u2212\uFF0D]/g,'-');
  const qtyVal=(isNaN(parseInt(qtyStr))||parseInt(qtyStr)===0)?1:parseInt(qtyStr);
  const isNeg=document.getElementById('btnSign').textContent==='−';
  const qty=isNeg?-Math.abs(qtyVal):qtyVal;
  const unit=document.getElementById('fUnit').value;
  const unitQty=parseInt(document.getElementById('fUnitQty').value)||1;
  const pieces=qty*unitQty;
  cart.push({barcode,loc,qty,unit,unitQty,pieces,itemName});
  renderCart();
  showToast('✅ เพิ่มลงตะกร้าแล้ว');
  // reset
  document.getElementById('fBarcode').value='';
  document.getElementById('fItemName').value='';
  document.getElementById('fItemName').readOnly=false;
  document.getElementById('fItemName').style.background='#fff';
  document.getElementById('bcPreview').style.display='none';
  document.getElementById('itemHint').style.display='none';
  document.getElementById('fQty').value='1';
  document.getElementById('btnSign').textContent='+';
  document.getElementById('btnSign').style.color='#1a1a1a';
  document.getElementById('btnSign').style.borderColor='#ddd';
  document.getElementById('pieceCalc').style.display='none';
  renderUnitBtns(null);
  if(document.getElementById('fLockLoc').checked) document.getElementById('fBarcode').focus();
  else document.getElementById('fLoc').focus();
}

function renderCart(){
  const area=document.getElementById('cartArea');
  if(cart.length===0){area.style.display='none';return;}
  area.style.display='block';
  document.getElementById('cartCount').textContent=cart.length;
  document.getElementById('cartList').innerHTML=cart.map((c,i)=>`
    <div class="cart-item">
      <span class="cart-bc">${c.barcode}</span>
      <span class="cart-nm">${c.itemName||'—'}</span>
      <span style="color:#888;font-size:11px">${c.loc}</span>
      <span class="cart-qty">${c.qty} ${c.unit}${c.unitQty>1?` (${c.pieces}ชิ้น)`:''}</span>
      <span class="cart-del" onclick="removeCart(${i})">✕</span>
    </div>`).join('');
}

function removeCart(i){cart.splice(i,1);renderCart();}

async function submitCart(){
  if(cart.length===0){showToast('⚠️ ยังไม่มีรายการในตะกร้า');return;}
  const btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  let ok=0,fail=0;
  for(const c of cart){
    try{
      const r=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify(c)});
      const j=await r.json();
      if(j.status==='ok') ok++; else fail++;
    }catch(e){fail++;}
  }
  btn.disabled=false;btn.innerHTML='💾 บันทึกเข้า Google Sheet (<span id="cartCount">0</span> รายการ)';
  if(fail===0){
    showToast(`✅ บันทึก ${ok} รายการสำเร็จ`);
    cart=[];renderCart();loadData();setConn(true,'เชื่อมต่อแล้ว');
  } else {
    showToast(`⚠️ สำเร็จ ${ok} ล้มเหลว ${fail}`,4000);
    setConn(false,'เชื่อมต่อไม่ได้');
  }
}

// ===== MASTER =====
function renderMaster(){
  const q=(document.getElementById('mSearch').value||'').toLowerCase();
  const keys=Object.keys(masterMap);
  const filtered=keys.filter(bc=>{
    const m=masterMap[bc];
    return !q||bc.includes(q)||m.name.toLowerCase().includes(q);
  });
  const list=document.getElementById('masterList');
  if(filtered.length===0){list.innerHTML='<div class="empty">ไม่พบรายการ</div>';return;}
  list.innerHTML=filtered.slice(0,100).map(bc=>{
    const m=masterMap[bc];
    const units=(m.units||[]).map(u=>`<span class="unit-tag">${u.label}${u.qty>1?` ×${u.qty}`:''}</span>`).join('');
    return `<div class="master-item">
      <div class="master-item-bc">${bc}</div>
      <div class="master-item-nm">${m.name}</div>
      ${units?`<div class="master-item-units">${units}</div>`:''}
    </div>`;
  }).join('')+(filtered.length>100?`<div class="empty">แสดง 100/${filtered.length} รายการ — กรองด้วยการค้นหา</div>`:'');
}

function addMUnitRow(label='',qty=''){
  const div=document.createElement('div');
  div.className='unit-row';
  div.innerHTML=`<input type="text" class="mu-label" placeholder="หน่วย เช่น แพ็ก" value="${label}" style="flex:1;font-size:14px;padding:8px">
    <input type="text" class="mu-qty" placeholder="×จำนวนชิ้น" value="${qty}" inputmode="numeric" style="width:90px;font-size:14px;padding:8px">
    <span class="del-unit" onclick="this.parentNode.remove()">✕</span>`;
  document.getElementById('mUnitList').appendChild(div);
}

async function saveMasterItem(){
  const bc=document.getElementById('mBarcode').value.trim();
  const name=document.getElementById('mName').value.trim();
  if(!bc||!name){showToast('⚠️ กรุณากรอกบาร์โค้ดและชื่อสินค้า');return;}
  const unitRows=[...document.querySelectorAll('#mUnitList .unit-row')];
  const units=unitRows.map(r=>({
    label:r.querySelector('.mu-label').value.trim(),
    qty:parseInt(r.querySelector('.mu-qty').value)||1
  })).filter(u=>u.label);
  // save to masterMap immediately
  masterMap[bc]={name,units};
  // save to Google Sheet
  try{
    const r=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'addMaster',barcode:bc,name,units:JSON.stringify(units)})});
    const j=await r.json();
    if(j.status==='ok') showToast('✅ บันทึกลง Master แล้ว');
    else showToast('⚠️ บันทึกลง Sheet ไม่สำเร็จ แต่ใช้งานได้ในเซสชันนี้',3000);
  }catch(e){
    showToast('⚠️ บันทึกลง Sheet ไม่สำเร็จ แต่ใช้งานได้ในเซสชันนี้',3000);
  }
  // reset form
  document.getElementById('mBarcode').value='';
  document.getElementById('mName').value='';
  document.getElementById('mUnitList').innerHTML='';
  renderMaster();
}

// ===== LOAD DATA =====
async function loadMaster(){
  try{
    const res=await fetch(SHEET_URL+'?action=master');
    const json=await res.json();
    (json.items||[]).forEach(([bc,name,unitsStr])=>{
      let units=[];
      try{units=JSON.parse(unitsStr||'[]');}catch(e){}
      masterMap[bc]={name,units};
    });
  }catch(err){console.error('โหลด master ไม่สำเร็จ',err);}
}

async function loadData(){
  try{
    const res=await fetch(SHEET_URL);
    const json=await res.json();
    items=(json.rows||[]).reverse();
    const total=items.reduce((s,it)=>s+(Number(it['ชิ้นสุทธิ'])||Number(it['นับได้'])||0),0);
    document.getElementById('stCount').textContent=items.length;
    document.getElementById('stTotal').textContent=total;
    setConn(true,'เชื่อมต่อแล้ว');
    renderList();
  }catch(err){
    setConn(false,'เชื่อมต่อไม่ได้');
  }
}

// ===== RENDER LIST =====
function renderList(){
  document.getElementById('listLbl').textContent=`รายการทั้งหมด (${items.length})`;
  document.getElementById('cardView').innerHTML=items.map(it=>{
    const qty=Number(it['นับได้'])||0;
    const pieces=Number(it['ชิ้นสุทธิ'])||qty;
    const bc=it['บาร์โค้ด']||'—';
    const nm=it['ชื่อสินค้า']||'';
    const unit=it['หน่วย']||'';
    const dt=it['วันเวลา']?new Date(it['วันเวลา']).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="card"><div class="card-body">
      <div class="card-top">
        <span class="card-time">${dt}</span>
        <span class="card-loc">${it['โลเคชั่น']||'—'}</span>
      </div>
      <div class="card-bc">${bc}</div>
      <div class="card-nm${nm?'':' empty'}">${nm||'ไม่มีชื่อสินค้า'}</div>
      <div class="cnt-row">
        <div class="cnt-box"><div class="cnt-lbl">นับได้</div><div class="cnt-num${qty<0?' neg':''}">${qty} <span style="font-size:12px;font-weight:400">${unit}</span></div></div>
        ${unit&&unit!=='pcs'&&unit!=='ชิ้น'?`<div class="cnt-box"><div class="cnt-lbl">ชิ้นสุทธิ</div><div class="cnt-num${pieces<0?' neg':''}">${pieces}</div></div>`:''}
      </div>
    </div></div>`;
  }).join('')||'<div class="empty">ยังไม่มีรายการ</div>';

  document.getElementById('tableView').innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>บาร์โค้ด</th><th>ชื่อสินค้า</th><th>โลเคชั่น</th><th>หน่วย</th><th>นับได้</th><th>ชิ้นสุทธิ</th><th>เวลา</th></tr></thead>
    <tbody>${items.map(it=>{
    const qty=Number(it['นับได้'])||0;
    const pieces=Number(it['ชิ้นสุทธิ'])||qty;
    const bc=it['บาร์โค้ด']||'—';
    const nm=it['ชื่อสินค้า']||'—';
    const dt=it['วันเวลา']?new Date(it['วันเวลา']).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    return `<tr>
      <td class="bc-td">${bc}</td>
      <td class="nm-td">${nm}</td>
      <td style="color:var(--text2)">${it['โลเคชั่น']||'—'}</td>
      <td style="color:var(--text2)">${it['หน่วย']||'—'}</td>
      <td class="num-td${qty<0?' neg':''}">${qty}</td>
      <td class="num-td${pieces<0?' neg':''}">${pieces}</td>
      <td style="color:var(--text3);white-space:nowrap;font-family:'SF Mono',monospace;font-size:11px">${dt}</td>
    </tr>`;}).join('')}</tbody></table></div>`;
  switchView(view);
}

// ===== EXPORT CSV =====
function exportCSV(){
  if(!items.length){showToast('⚠️ ยังไม่มีข้อมูลให้ export');return;}
  const esc=v=>{const s=v===null||v===undefined?'':String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const lines=[['วันเวลา','บาร์โค้ด','ชื่อสินค้า','โลเคชั่น','หน่วย','นับได้','ชิ้นสุทธิ'].join(',')];
  items.forEach(it=>{
    const dt=it['วันเวลา']?new Date(it['วันเวลา']).toLocaleString('th-TH'):'';
    const qty=Number(it['นับได้'])||0;
    const pieces=Number(it['ชิ้นสุทธิ'])||qty;
    lines.push([dt,it['บาร์โค้ด']||'',it['ชื่อสินค้า']||'',it['โลเคชั่น']||'',it['หน่วย']||'',qty,pieces].map(esc).join(','));
  });
  // summary
  const sm={};
  items.forEach(it=>{
    const bc=String(it['บาร์โค้ด']||'—');
    const nm=String(it['ชื่อสินค้า']||'');
    const loc=String(it['โลเคชั่น']||'—');
    const key=bc+'|'+loc;
    if(!sm[key]) sm[key]={bc,nm,loc,qty:0,pieces:0,cnt:0};
    sm[key].qty+=Number(it['นับได้'])||0;
    sm[key].pieces+=Number(it['ชิ้นสุทธิ'])||Number(it['นับได้'])||0;
    sm[key].cnt++;
  });
  lines.push('','สรุปยอดสุทธิ');
  lines.push(['บาร์โค้ด','ชื่อสินค้า','โลเคชั่น','รายการ','ยอดหน่วย','ยอดชิ้นสุทธิ'].join(','));
  Object.values(sm).sort((a,b)=>String(a.bc).localeCompare(String(b.bc))).forEach(r=>{
    lines.push([r.bc,r.nm,r.loc,r.cnt,r.qty,r.pieces].map(esc).join(','));
  });
  const grand=Object.values(sm).reduce((s,r)=>s+r.pieces,0);
  lines.push(['รวมทั้งหมด','','','','',grand].map(esc).join(','));
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const ts=new Date().toLocaleString('th-TH').replace(/[/:, ]/g,'-');
  a.href=url;a.download=`สินค้าเกิน_${ts}.csv`;a.click();URL.revokeObjectURL(url);
}

// ===== SCANNER =====
(function(){
  let buf='',timer=null;
  document.addEventListener('keydown',function(e){
    const tag=document.activeElement.tagName;
    const id=document.activeElement.id;
    if((tag==='INPUT'||tag==='SELECT')&&id!=='fBarcode') return;
    if(e.key==='Enter'){
      e.preventDefault();
      if(buf.length>0){
        document.getElementById('fBarcode').value=buf;
        previewBarcode();buf='';clearTimeout(timer);
        setTimeout(()=>{
          const qty=document.getElementById('fQty');
          qty.select();qty.focus();
        },80);
      }
      return;
    }
    if(/^[0-9]$/.test(e.key)){
      e.preventDefault();buf+=e.key;
      document.getElementById('fBarcode').value=buf;
      previewBarcode();clearTimeout(timer);
      timer=setTimeout(()=>{
        if(buf.length>=6){const b=buf;buf='';document.getElementById('fBarcode').value=b;previewBarcode();setTimeout(()=>{const qty=document.getElementById('fQty');qty.select();qty.focus();},80);}
        else buf='';
      },300);
    } else if(e.key.length===1){
      e.preventDefault();buf='';clearTimeout(timer);
    }
  });
})();

loadData();
loadMaster();

  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
  try{localStorage.setItem('theme',isDark?'light':'dark');}catch(e){}
}

    if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeBtn').textContent='☀️';}
  }catch(e){}
})();
