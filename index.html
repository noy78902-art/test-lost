<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกสินค้าเกิน (มีชื่อสินค้า)</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh}
.w{max-width:480px;margin:0 auto;padding:12px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:12px;background:#fff;border-radius:12px;border:1px solid #e5e5e5}
.ht{font-size:16px;font-weight:600;color:#1a1a1a}
.dot{width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:#3aaa6e}
.dot.err{background:#e04040}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sc{background:#fff;border-radius:10px;padding:10px 12px;border:1px solid #e5e5e5}
.sc-l{font-size:11px;color:#888;margin-bottom:3px}
.sc-v{font-size:20px;font-weight:600;color:#1a1a1a}
.fc{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin-bottom:14px}
.ft{font-size:13px;font-weight:600;color:#888;margin-bottom:12px}
label{font-size:12px;color:#888;display:block;margin-bottom:4px}
input[type=text],input[type=number]{width:100%;font-size:16px;padding:12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;-webkit-appearance:none;appearance:none;outline:none}
input[type=number]{-moz-appearance:textfield}
input:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,0.08)}
.frow{margin-bottom:10px}
.bc-preview{margin-top:8px;text-align:center;display:none}
.bc-preview svg{max-width:100%;height:55px}
.bc-val{font-size:12px;color:#aaa;margin-top:3px;word-break:break-all}
.lock-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#666;margin:6px 0 10px;cursor:pointer}
.lock-row input{width:15px;height:15px;flex-shrink:0}
.btn-save{width:100%;padding:14px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s}
.btn-save:active{opacity:0.8}
.btn-save:disabled{background:#aaa;cursor:not-allowed}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
.view-tabs{display:flex;margin-bottom:10px;border:1px solid #ddd;border-radius:10px;overflow:hidden;background:#fff}
.vtab{flex:1;padding:10px;font-size:13px;cursor:pointer;background:transparent;color:#888;border:none;font-weight:500;-webkit-tap-highlight-color:transparent}
.vtab.on{background:#EEEDFE;color:#3C3489;font-weight:600}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.btn-exp{padding:8px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500}
.btn-exp svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ll{font-size:13px;font-weight:600;color:#888}
.tbl-wrap{overflow-x:auto;background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:300px}
th{background:#fafafa;padding:9px 10px;text-align:left;font-weight:600;color:#888;border-bottom:1px solid #e5e5e5;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
.diff-pos{color:#A32D2D;font-weight:600}
.diff-neg{color:#27500A;font-weight:600}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-bc{padding:10px;text-align:center;border-bottom:1px solid #f0f0f0}
.card-bc svg{max-width:100%;height:50px}
.card-bc-val{font-size:11px;color:#aaa;margin-top:2px;word-break:break-all}
.card-nobc{height:44px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px;border-bottom:1px solid #f0f0f0}
.card-body{padding:12px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.csub{font-size:12px;color:#aaa}
.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px}
.cnt-box{background:#f5f5f7;border-radius:10px;padding:8px;text-align:center}
.cnt-lbl{font-size:11px;color:#888;margin-bottom:5px}
.cnt-num{font-size:22px;font-weight:700;color:#1a1a1a}
.diff-box{background:#f5f5f7;border-radius:10px;padding:8px;text-align:center;margin-bottom:8px}
.loc-row{font-size:12px;color:#aaa}
.loc-v{font-weight:600;color:#444}
.empty{text-align:center;padding:40px 0;color:#bbb;font-size:14px}
.setup-banner{background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:#5D4037;line-height:1.6}
.setup-banner strong{display:block;margin-bottom:4px;font-size:14px}
</style>
</head>
<body>
<div class="w">
  <div class="hd">
    <div class="ht">
      <svg style="width:18px;height:18px;vertical-align:-3px;margin-right:6px;stroke:#534AB7;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
      สินค้าเกิน (มีชื่อสินค้า)
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#888">
      <div class="dot" id="connDot"></div>
      <span id="connTxt">กำลังเชื่อมต่อ...</span>
    </div>
  </div>

  <div id="setupBanner" class="setup-banner" style="display:none">
    <strong>⚙️ ยังไม่ได้ตั้ง URL</strong>
    แก้ไขตัวแปร <code>SHEET_URL</code> ในไฟล์นี้ให้เป็น Web App URL จาก Apps Script แล้วรีโหลด
  </div>

  <div class="stats" id="stats">
    <div class="sc"><div class="sc-l">รายการ</div><div class="sc-v">—</div></div>
    <div class="sc"><div class="sc-l">นับได้รวม</div><div class="sc-v">—</div></div>
  </div>

  <div class="fc">
    <div class="ft">เพิ่มรายการใหม่</div>
    <div class="frow">
      <label>① โลเคชั่น</label>
      <input type="text" id="fLoc" placeholder="เช่น ชั้น A3" autocomplete="off">
    </div>
    <div class="frow">
      <label>② บาร์โค้ด</label>
      <input type="text" id="fBarcode" placeholder="สแกนหรือพิมพ์บาร์โค้ด" oninput="previewBarcode()" autocomplete="off" inputmode="numeric">
      <div class="bc-preview" id="bcPreview">
        <svg id="bcSvgForm"></svg>
        <div class="bc-val" id="bcValForm"></div>
      </div>
      <div id="itemNamePreview" style="display:none;margin-top:6px;padding:8px 12px;background:#F3F2FC;border-radius:8px;font-weight:600;color:#534AB7"></div>
    </div>
    <div class="frow">
      <label>③ จำนวนนับได้ <span style="color:#aaa;font-weight:400">(กดปุ่ม ± เพื่อลบล้างรายการที่ยิงผิด)</span></label>
      <div style="display:flex;gap:8px">
        <button type="button" id="btnSign" onclick="toggleSign()" style="width:48px;flex-shrink:0;font-size:18px;font-weight:700;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer">+</button>
        <input type="text" id="fQty" value="1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="flex:1">
      </div>
    </div>
    <label class="lock-row"><input type="checkbox" id="fLockLoc" checked> ล็อกโลเคชั่นไว้ใช้ต่อ (สแกนของในโซนเดียวกันต่อเนื่อง)</label>
    <button class="btn-save" id="btnSave" onclick="addItem()">บันทึกเข้า Google Sheet</button>
  </div>

  <div class="view-tabs">
    <button class="vtab on" id="tabCard" onclick="switchView('card')">การ์ด</button>
    <button class="vtab" id="tabTable" onclick="switchView('table')">ตาราง</button>
  </div>
  <div class="toolbar">
    <span class="ll" id="listLbl">รายการทั้งหมด</span>
    <button class="btn-exp" onclick="exportCSV()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
  </div>

  <div id="cardView"></div>
  <div id="tableView" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ====== ตั้งค่า URL ตรงนี้ ======
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyZxKt6kqHU5Pj2oUUpN4vFj4VOvhS8NJDJPkcuAb-HSPljCTqcZsY1sBL3O95klcSBqA/exec';
// ================================

let items = [];
let view = 'card';
let masterMap = {}; // บาร์โค้ด -> ชื่อสินค้า (แคชไว้ในเครื่อง)

function exportCSV(){
  if(!items.length){showToast('⚠️ ยังไม่มีข้อมูลให้ export');return;}
  const headers=['วันเวลา','บาร์โค้ด','โลเคชั่น','นับได้'];
  const escCsv=v=>{
    const s=(v===undefined||v===null)?'':String(v);
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  };
  const lines=[headers.join(',')];
  items.forEach(it=>{
    const dt=it['วันเวลา']?new Date(it['วันเวลา']).toLocaleString('th-TH'):'';
    lines.push([dt,it['บาร์โค้ด']||'',it['โลเคชั่น']||'',Number(it['นับได้'])||0].map(escCsv).join(','));
  });

  // สรุปยอดสุทธิต่อบาร์โค้ด+โลเคชั่น ต่อท้ายไฟล์
  const summaryMap={};
  items.forEach(it=>{
    const bc=String(it['บาร์โค้ด']||'—');
    const loc=String(it['โลเคชั่น']||'—');
    const key=bc+'|||'+loc;
    if(!summaryMap[key]) summaryMap[key]={bc,loc,total:0,count:0};
    summaryMap[key].total+=Number(it['นับได้'])||0;
    summaryMap[key].count+=1;
  });
  const summaryRows=Object.values(summaryMap).sort((a,b)=>String(a.bc).localeCompare(String(b.bc))||String(a.loc).localeCompare(String(b.loc)));

  lines.push('');
  lines.push('สรุปยอดสุทธิ');
  lines.push(['บาร์โค้ด','โลเคชั่น','จำนวนรายการ','ยอดสุทธิ'].join(','));
  summaryRows.forEach(r=>{
    lines.push([r.bc,r.loc,r.count,r.total].map(escCsv).join(','));
  });
  const grandTotal=summaryRows.reduce((s,r)=>s+r.total,0);
  lines.push('');
  lines.push(['รวมทั้งหมด','','',grandTotal].map(escCsv).join(','));

  const csv='\uFEFF'+lines.join('\r\n'); // BOM ให้ Excel อ่านภาษาไทยถูก
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ts=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`สินค้าเกิน_${ts}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Export แล้ว');
}

function showToast(msg, dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function setConn(ok, txt){
  document.getElementById('connDot').className='dot '+(ok?'ok':'err');
  document.getElementById('connTxt').textContent=txt;
}

function switchView(v){
  view=v;
  document.getElementById('tabCard').className='vtab'+(v==='card'?' on':'');
  document.getElementById('tabTable').className='vtab'+(v==='table'?' on':'');
  document.getElementById('cardView').style.display=v==='card'?'block':'none';
  document.getElementById('tableView').style.display=v==='table'?'block':'none';
}

function toggleSign(){
  const btn=document.getElementById('btnSign');
  const neg=btn.textContent==='+';
  btn.textContent=neg?'−':'+';
  btn.style.color=neg?'#A32D2D':'#1a1a1a';
  btn.style.borderColor=neg?'#A32D2D':'#ddd';
}

function previewBarcode(){
  const val=document.getElementById('fBarcode').value.trim();
  const wrap=document.getElementById('bcPreview');
  const nameBox=document.getElementById('itemNamePreview');
  if(!val){wrap.style.display='none';nameBox.style.display='none';return;}
  try{
    JsBarcode('#bcSvgForm',val,{format:'CODE128',width:1.5,height:48,displayValue:false,margin:4});
    document.getElementById('bcValForm').textContent=val;
    wrap.style.display='block';
  }catch(e){wrap.style.display='none';}

  const name=masterMap[val];
  if(name){
    nameBox.textContent='📦 '+name;
    nameBox.style.display='block';
  } else {
    nameBox.textContent='⚠️ ไม่พบชื่อสินค้าในระบบ';
    nameBox.style.display='block';
  }
}

async function loadMaster(){
  try{
    const res=await fetch(SHEET_URL+'?action=master');
    const json=await res.json();
    (json.items||[]).forEach(([bc,name])=>{ masterMap[bc]=name; });
  }catch(err){
    console.error('โหลด master ไม่สำเร็จ',err);
  }
}

async function addItem(){
  if(SHEET_URL==='YOUR_WEB_APP_URL_HERE'){showToast('⚠️ ยังไม่ได้ใส่ SHEET_URL');return;}
  const barcode=document.getElementById('fBarcode').value.trim();
  const qtyStr=document.getElementById('fQty').value.replace(/[\u2010-\u2015\u2212\uFF0D]/g,'-');
  const qtyRaw=parseInt(qtyStr);
  const qtyVal=(isNaN(qtyRaw)||qtyRaw===0)?1:qtyRaw;
  const isNeg=document.getElementById('btnSign').textContent==='−';
  const qty=isNeg?-Math.abs(qtyVal):qtyVal;
  const loc=document.getElementById('fLoc').value.trim()||'—';
  const lockLoc=document.getElementById('fLockLoc').checked;

  if(!barcode){showToast('⚠️ กรุณาสแกนหรือกรอกบาร์โค้ด');return;}
  if(!/^[0-9]+$/.test(barcode)){
    showToast('⚠️ บาร์โค้ดไม่ถูกต้อง (รับเฉพาะตัวเลข ห้ามยิง QR code)',3500);
    return;
  }

  const btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';

  try{
    const res=await fetch(SHEET_URL,{
      method:'POST',
      body:JSON.stringify({barcode,qty,loc}),
    });
    const json=await res.json();
    if(json.status==='ok'){
      showToast('✅ บันทึกแล้ว');
      document.getElementById('fBarcode').value='';
      document.getElementById('fQty').value='1';
      document.getElementById('btnSign').textContent='+';
      document.getElementById('btnSign').style.color='#1a1a1a';
      document.getElementById('btnSign').style.borderColor='#ddd';
      if(!lockLoc) document.getElementById('fLoc').value='';
      document.getElementById('bcPreview').style.display='none';
      document.getElementById('itemNamePreview').style.display='none';
      setConn(true,'เชื่อมต่อแล้ว');
      loadData();
    } else {
      showToast('❌ '+json.message,3000);
    }
  }catch(err){
    showToast('❌ ส่งข้อมูลไม่ได้',3000);
    setConn(false,'เชื่อมต่อไม่ได้');
  }
  btn.disabled=false;btn.textContent='บันทึกเข้า Google Sheet';
  if(lockLoc){
    document.getElementById('fBarcode').focus();
  } else {
    document.getElementById('fLoc').focus();
  }
}

async function loadData(){
  if(SHEET_URL==='YOUR_WEB_APP_URL_HERE'){
    document.getElementById('setupBanner').style.display='block';
    setConn(false,'ยังไม่ได้ตั้งค่า');return;
  }
  try{
    const res=await fetch(SHEET_URL);
    const json=await res.json();
    items=(json.rows||[]).reverse();
    setConn(true,'เชื่อมต่อแล้ว');
    renderList();
  }catch(err){
    setConn(false,'เชื่อมต่อไม่ได้');
  }
}

function renderList(){
  const tq=items.reduce((s,r)=>s+(Number(r['นับได้'])||0),0);
  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sc-l">รายการ</div><div class="sc-v">${items.length}</div></div>
    <div class="sc"><div class="sc-l">นับได้รวม</div><div class="sc-v">${tq}</div></div>`;
  document.getElementById('listLbl').textContent=`รายการทั้งหมด (${items.length})`;

  const empty=`<div class="empty">ยังไม่มีรายการ</div>`;
  if(!items.length){
    document.getElementById('cardView').innerHTML=empty;
    document.getElementById('tableView').innerHTML=empty;
    switchView(view);return;
  }

  document.getElementById('cardView').innerHTML=items.map((it,i)=>{
    const qty=Number(it['นับได้'])||0;
    const bc=it['บาร์โค้ด']||'—';
    const dt=it['วันเวลา']?new Date(it['วันเวลา']).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="card">
      <div class="card-body">
        <div class="card-top">
          <div class="csub">${dt}</div>
          <div style="font-size:12px;color:#888">${it['โลเคชั่น']||'—'}</div>
        </div>
        <div style="font-size:13px;color:#444;margin-bottom:8px;word-break:break-all">บาร์โค้ด: <b>${bc}</b></div>
        <div class="cnt-box"><div class="cnt-lbl">นับได้</div><div class="cnt-num ${qty<0?'diff-neg':''}">${qty}</div></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tableView').innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>บาร์โค้ด</th><th>โลเคชั่น</th><th style="text-align:right">นับได้</th><th>เวลา</th></tr></thead>
    <tbody>${items.map((it,i)=>{
      const qty=Number(it['นับได้'])||0;
      const bc=it['บาร์โค้ด']||'—';
      const dt=it['วันเวลา']?new Date(it['วันเวลา']).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
      return `<tr>
        <td>${bc}</td>
        <td style="color:#888">${it['โลเคชั่น']||'—'}</td>
        <td style="text-align:right;font-weight:600" class="${qty<0?'diff-neg':''}">${qty}</td>
        <td style="color:#aaa;white-space:nowrap">${dt}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;

  switchView(view);
}

// Global scanner
(function(){
  let buf='',timer=null;
  document.addEventListener('keydown',function(e){
    const tag=document.activeElement.tagName;
    const id=document.activeElement.id;
    if((tag==='INPUT'||tag==='SELECT')&&id!=='fBarcode') return;
    if(e.key==='Enter'){
      e.preventDefault();
      if(buf.length>0){
        document.getElementById('fBarcode').value=buf;
        previewBarcode();buf='';clearTimeout(timer);
        addItem();
      }
      return;
    }
    if(/^[0-9]$/.test(e.key)){
      e.preventDefault();buf+=e.key;
      document.getElementById('fBarcode').value=buf;
      previewBarcode();clearTimeout(timer);
      timer=setTimeout(()=>{
        // ไม่มี Enter ตามมา (สแกนเนอร์บางรุ่นไม่ส่ง Enter) ให้ auto บันทึกถ้าความยาวดูสมเหตุสมผล
        if(buf.length>=6){
          const b=buf;buf='';
          document.getElementById('fBarcode').value=b;
          previewBarcode();
          addItem();
        } else {
          buf='';
        }
      },300);
    } else if(e.key.length===1){
      // ตัวอักษรที่ไม่ใช่ตัวเลข (เช่น จาก QR code) เคลียร์บัฟเฟอร์ทิ้ง ไม่รับ
      e.preventDefault();
      buf='';
      clearTimeout(timer);
    }
  });
})();

loadData();
loadMaster();
</script>
